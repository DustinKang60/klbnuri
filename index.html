  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { --fs: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }
    #root { min-height: 100vh; }

    /* 버튼 공통 */
    .btn {
      border: none; cursor: pointer; border-radius: 8px;
      font-size: 14px; font-weight: 600; padding: 8px 16px;
      transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-primary { background: #1a2744; color: #fff; }
    .btn-gold    { background: #c9a84c; color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid #1a2744; color: #1a2744; }
    .btn-danger  { background: #d9534f; color: #fff; }
    .btn-sm      { padding: 7px 14px; font-size: 13px; }

    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #1a2744 0%, #2c3f6e 100%);
      color: #fff; padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .header-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    .header-title span { color: #c9a84c; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-count { font-size: 12px; color: #a0aec0; }
    .settings-btn {
      background: transparent; border: none; cursor: pointer;
      color: #a0aec0; font-size: 20px; padding: 4px; line-height: 1;
    }

    /* 검색바 */
    .search-bar {
      background: #fff; padding: 12px 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .search-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .search-input {
      flex: 1; border: 1.5px solid #d0d5dd; border-radius: 8px;
      padding: 10px 14px; font-size: 15px; outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: #1a2744; }
    .search-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      padding: 5px 12px; border-radius: 20px; font-size: 13px;
      cursor: pointer; border: 1.5px solid #d0d5dd;
      background: #fff; color: #555; transition: all .15s; font-weight: 500;
    }
    .tab.active { background: #1a2744; color: #fff; border-color: #1a2744; }

    /* 카드 */
    .list-wrap { padding: 12px; }
    .card {

      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      cursor: pointer; overflow: hidden;
    }
    .card:active { box-shadow: 0 3px 12px rgba(26,39,68,.2); }
    .card-main { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: #1a2744; color: #c9a84c;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: var(--fs); font-weight: 700; color: #1a2744; }
    .card-sub {
      font-size: 13px; color: #888; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-arrow { color: #bbb; font-size: 18px; }

    /* 빈 상태 */
    .empty { text-align: center; padding: 60px 20px; color: #aaa; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* 패널 공통 */
    .panel-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; display: flex; align-items: flex-end;
    }
    .panel {
      background: #fff; width: 100%; max-height: 90vh;
      border-radius: 20px 20px 0 0; overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .panel-header {
      position: sticky; top: 0; background: #1a2744; color: #fff;
      padding: 16px 20px; border-radius: 20px 20px 0 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header h2 { font-size: 17px; font-weight: 700; }
    .panel-close {
      background: transparent; border: none; color: #fff;
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    .panel-body { padding: 16px 20px; }

    /* 섹션 */
    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 12px; font-weight: 700; color: #c9a84c;
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1.5px solid #f0f0f0;
    }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field.full { grid-column: 1 / -1; }
    .field-label { font-size: 11px; color: #999; font-weight: 600; }
    .field-value { font-size: var(--fs); color: #222; word-break: break-all; }
    .field-value.empty-val { color: #ccc; font-style: italic; }

    /* 편집 폼 */
    .form-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .form-label { font-size: 12px; color: #555; font-weight: 600; }
    .form-input {
      border: 1.5px solid #d0d5dd; border-radius: 7px;
      padding: 8px 12px; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: #1a2744; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-full { grid-column: 1 / -1; }

    .action-bar {
      display: flex; gap: 8px; padding: 16px 20px;
      border-top: 1px solid #eee; position: sticky; bottom: 0; background: #fff;
    }
    .action-bar .btn { flex: 1; padding: 12px; font-size: 15px; }

    /* FAB */
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 54px; height: 54px; border-radius: 50%;
      background: #c9a84c; color: #fff;
      font-size: 26px; border: none; cursor: pointer;
      box-shadow: 0 4px 14px rgba(201,168,76,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 150;
    }
    .fab:active { opacity: .8; }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #1a2744; color: #fff; padding: 10px 20px;
      border-radius: 24px; font-size: 14px; z-index: 300;
      animation: fadeInOut 2.2s ease forwards;
      white-space: nowrap;
    }
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 설정 패널 */
    .settings-panel {
      background: #fff; width: 100%;
      border-radius: 20px 20px 0 0;
      padding-bottom: 40px;
      animation: slideUp .25s ease;
    }
    .settings-body { padding: 24px 20px; }
    .settings-section-title {
      font-size: 12px; font-weight: 700; color: #c9a84c;
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 16px; padding-bottom: 6px;
      border-bottom: 1.5px solid #f0f0f0;
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .settings-label { font-size: 15px; font-weight: 600; color: #333; }
    .settings-label small { display: block; font-size: 12px; color: #999; font-weight: 400; margin-top: 2px; }
    .size-control { display: flex; align-items: center; gap: 14px; }
    .size-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid #1a2744; background: #fff;
      color: #1a2744; font-size: 22px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .size-btn:active { background: #1a2744; color: #fff; }
    .size-btn:disabled { opacity: .3; }
    .size-value { font-size: 18px; font-weight: 700; color: #1a2744; min-width: 36px; text-align: center; }
    .size-preview {
      background: #f8f9fc; border-radius: 10px; padding: 14px 16px;
      border: 1px solid #e8eaf0; margin-top: 8px;
    }
    .size-preview-name { font-weight: 700; color: #1a2744; }
    .size-preview-sub  { color: #888; margin-top: 4px; }

    .highlight { background: #fff3cd; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;
var useRef = React.useRef;

// ── 스토리지 ──────────────────────────────────────────────
var STORAGE_KEY = 'klbnuri_data_v1';
var SETTINGS_KEY = 'klbnuri_settings_v1';

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  var data = (INITIAL_DATA || []).map(function(r, i) { return Object.assign({}, r, {_id: i + 1}); });
  saveData(data);
  return data;
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch(e) { return {}; }
}
function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
}
function blurActive() {
  if (document.activeElement) { document.activeElement.blur(); }
}

// ── 상수 ──────────────────────────────────────────────────
var COLUMNS = [
  '이름','성별','생년월일','퇴직일','현재직장','부서명','직위','직장전화','직장주소','직장우편',
  '휴대폰','비망록','E-mail','현주소1','현주소2','현주소3','집우편','지역번호','전화번호',
  '고교','고교장소','고교입학','고교졸업',
  '전문대','전문대장소','전문대과','전문입학','전문졸업',
  '대학','대학장소','대학과','대학입학','대학졸업',
  '대학원1','대학원1장소','대학원1과','대학원1전공','대학원1입학','대학원1졸업',
  '대학원2','대학원2장소','대학원2과','대학원2입학','대학원2졸업',
  '입행일','사망일자'
];

var FULL_FIELDS = ['비망록','현주소1','현주소2','현주소3','직장주소'];

var SECTIONS = [
  { title: '기본 정보',  fields: ['이름','성별','생년월일','사망일자','휴대폰','E-mail','비망록'] },
  { title: '직장 정보',  fields: ['현재직장','부서명','직위','직장전화','직장주소','직장우편','입행일','퇴직일'] },
  { title: '자택 정보',  fields: ['현주소1','현주소2','현주소3','집우편','지역번호','전화번호'] },
  { title: '고교',       fields: ['고교','고교장소','고교입학','고교졸업'] },
  { title: '전문대',     fields: ['전문대','전문대장소','전문대과','전문입학','전문졸업'] },
  { title: '대학교',     fields: ['대학','대학장소','대학과','대학입학','대학졸업'] },
  { title: '대학원 1',   fields: ['대학원1','대학원1장소','대학원1과','대학원1전공','대학원1입학','대학원1졸업'] },
  { title: '대학원 2',   fields: ['대학원2','대학원2장소','대학원2과','대학원2입학','대학원2졸업'] },
];

var SEARCH_TABS = [
  { id: 'all',   label: '전체' },
  { id: '이름',  label: '이름' },
  { id: '고교',  label: '고교' },
  { id: '대학',  label: '대학' },
  { id: '현재직장', label: '직장' },
];

var FONT_SIZES = [
  { label: '작게',     value: 13 },
  { label: '보통',     value: 15 },
  { label: '크게',     value: 17 },
  { label: '매우 크게', value: 20 },
];

// ── 유틸 ──────────────────────────────────────────────────
function highlight(text, query) {
  if (!query || !text) return text || '';
  var str = text.toString();
  var idx = str.indexOf(query);
  if (idx < 0) return str;
  return React.createElement('span', null,
    str.slice(0, idx),
    React.createElement('mark', {className: 'highlight'}, str.slice(idx, idx + query.length)),
    str.slice(idx + query.length)
  );
}

function cardSub(r) {
  var parts = [r['고교'], r['대학'], r['현재직장']].filter(Boolean);
  return parts.join(' | ') || '정보 없음';
}

// ── 설정 패널 ─────────────────────────────────────────────
function SettingsPanel(props) {
  var onClose = props.onClose;
  var fontSize = props.fontSize;
  var setFontSize = props.setFontSize;

  var currentIdx = FONT_SIZES.findIndex(function(s) { return s.value === fontSize; });
  var currentLabel = currentIdx >= 0 ? FONT_SIZES[currentIdx].label : '보통';

  function decrease() {
    if (currentIdx > 0) setFontSize(FONT_SIZES[currentIdx - 1].value);
  }
  function increase() {
    if (currentIdx < FONT_SIZES.length - 1) setFontSize(FONT_SIZES[currentIdx + 1].value);
  }

  return (
    <div className="panel-overlay" onClick={onClose}>
      <div className="settings-panel" onClick={function(e) { e.stopPropagation(); }}>
        <div className="panel-header">
          <h2>⚙️ 설정</h2>
          <button className="panel-close" onClick={onClose}>✕</button>
        </div>
        <div className="settings-body">
          <div className="settings-section-title">화면 표시</div>
          <div className="settings-row">
            <div className="settings-label">
              글자 크기
              <small>현재: {currentLabel} ({fontSize}px)</small>
            </div>
            <div className="size-control">
              <button className="size-btn" onClick={decrease} disabled={currentIdx === 0}>−</button>
              <span className="size-value">{fontSize}</span>
              <button className="size-btn" onClick={increase} disabled={currentIdx === FONT_SIZES.length - 1}>＋</button>
            </div>
          </div>
          <div className="size-preview" style={{fontSize: fontSize + 'px'}}>
            <div className="size-preview-name">홍길동</div>
            <div className="size-preview-sub" style={{fontSize: (fontSize - 2) + 'px'}}>서울고 | 서울대 | 장기신용은행</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 상세보기 ──────────────────────────────────────────────
function DetailPanel(props) {
  var record = props.record;
  var onClose = props.onClose;
  var onEdit = props.onEdit;
  var onDelete = props.onDelete;

  return (
    <div className="panel-overlay" onClick={onClose}>
      <div className="panel" onClick={function(e) { e.stopPropagation(); }}>
        <div className="panel-header">
          <h2>{record['이름']}</h2>
          <button className="panel-close" onClick={onClose}>✕</button>
        </div>
        <div className="panel-body">
          {SECTIONS.map(function(sec) {
            var leadVal = record[sec.fields[0]];
            if (!leadVal) return null;
            return (
              <div className="section" key={sec.title}>
                <div className="section-title">{sec.title}</div>
                <div className="field-grid">
                  {sec.fields.map(function(f) {
                    return (
                      <div key={f} className={'field' + (FULL_FIELDS.indexOf(f) >= 0 ? ' full' : '')}>
                        <span className="field-label">{f}</span>
                        <span className={'field-value' + (record[f] ? '' : ' empty-val')}>
                          {record[f] || '—'}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="action-bar">
          <button className="btn btn-outline" onClick={onDelete}>삭제</button>
          <button className="btn btn-gold" onClick={onEdit}>수정</button>
        </div>
      </div>
    </div>
  );
}

// ── 편집/추가 폼 ──────────────────────────────────────────
function EditPanel(props) {
  var record = props.record;
  var onClose = props.onClose;
  var onSave = props.onSave;
  var isNew = !record._id;

  var initForm = {};
  COLUMNS.forEach(function(c) { initForm[c] = record[c] || ''; });
  var formState = useState(initForm);
  var form = formState[0];
  var setForm = formState[1];

  function setField(field, val) {
    setForm(function(f) {
      var next = Object.assign({}, f);
      next[field] = val;
      return next;
    });
  }

  function handleSave() {
    if (!form['이름'].trim()) { alert('이름은 필수입니다.'); return; }
    onSave(Object.assign({}, record, form));
  }

  return (
    <div className="panel-overlay" onClick={onClose}>
      <div className="panel" onClick={function(e) { e.stopPropagation(); }}>
        <div className="panel-header">
          <h2>{isNew ? '신규 등록' : '정보 수정'}</h2>
          <button className="panel-close" onClick={onClose}>✕</button>
        </div>
        <div className="panel-body">
          {SECTIONS.map(function(sec) {
            return (
              <div className="section" key={sec.title}>
                <div className="section-title">{sec.title}</div>
                <div className="form-grid">
                  {sec.fields.map(function(f) {
                    return (
                      <div key={f} className={'form-field' + (FULL_FIELDS.indexOf(f) >= 0 ? ' form-full' : '')}>
                        <label className="form-label">{f}</label>
                        <input
                          className="form-input"
                          value={form[f]}
                          onChange={function(e) { var v = e.target.value; setField(f, v); }}
                          placeholder={f}
                        />
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="action-bar">
          <button className="btn btn-outline" onClick={onClose}>취소</button>
          <button className="btn btn-gold" onClick={handleSave}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────
function App() {
  var dataState = useState(function() { return loadData(); });
  var data = dataState[0]; var setData = dataState[1];

  var queryState = useState('');
  var query = queryState[0]; var setQuery = queryState[1];

  var tabState = useState('all');
  var tab = tabState[0]; var setTab = tabState[1];

  var selectedState = useState(null);
  var selected = selectedState[0]; var setSelected = selectedState[1];

  var editingState = useState(null);
  var editing = editingState[0]; var setEditing = editingState[1];

  var addNewState = useState(false);
  var addNew = addNewState[0]; var setAddNew = addNewState[1];

  var showSettingsState = useState(false);
  var showSettings = showSettingsState[0]; var setShowSettings = showSettingsState[1];

  var toastState = useState(null);
  var toast = toastState[0]; var setToast = toastState[1];

  var fontSizeState = useState(function() { return loadSettings().fontSize || 15; });
  var fontSize = fontSizeState[0]; var setFontSizeState = fontSizeState[1];

  var toastTimer = useRef(null);

  useEffect(function() {
    document.documentElement.style.setProperty('--fs', fontSize + 'px');
  }, []);

  function setFontSize(size) {
    setFontSizeState(size);
    saveSettings({ fontSize: size });
    document.documentElement.style.setProperty('--fs', size + 'px');
  }

  function showToast(msg) {
    setToast(null);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(function() {
      setToast(msg);
      setTimeout(function() { setToast(null); }, 2200);
    }, 50);
  }

  function persist(newData) {
    setData(newData);
    saveData(newData);
  }

  // 검색 필터
  var filtered = data.filter(function(r) {
    if (!query.trim()) return true;
    var q = query.trim();
    if (tab === 'all') {
      return COLUMNS.some(function(c) { return r[c] && r[c].toString().indexOf(q) >= 0; });
    }
    if (tab === '대학') {
      return ['대학','대학원1','대학원2','전문대'].some(function(c) { return r[c] && r[c].indexOf(q) >= 0; });
    }
    return r[tab] && r[tab].toString().indexOf(q) >= 0;
  });

  function handleEdit() {
    setEditing(selected);
    setSelected(null);
  }

  function handleDelete() {
    if (!window.confirm('"' + selected['이름'] + '" 을(를) 삭제하시겠습니까?')) return;
    persist(data.filter(function(r) { return r._id !== selected._id; }));
    setSelected(null);
    showToast('삭제되었습니다.');
  }

  function handleSave(updated) {
    if (updated._id) {
      persist(data.map(function(r) { return r._id === updated._id ? updated : r; }));
      showToast('수정되었습니다.');
    } else {
      var maxId = data.reduce(function(m, r) { return Math.max(m, r._id || 0); }, 0);
      persist(data.concat([Object.assign({}, updated, {_id: maxId + 1})]));
      showToast('등록되었습니다.');
    }
    setEditing(null);
    setAddNew(false);
  }

  var displayList = filtered.slice(0, 200);

  return (
    <React.Fragment>
      {/* 헤더 */}
      <div className="header">
        <div className="header-title">KLB<span>nuri</span></div>
        <div className="header-right">
          <span className="header-count">총 {data.length}명 · 검색 {filtered.length}명</span>
          <button className="settings-btn" onClick={function() { setShowSettings(true); }}>⚙️</button>
        </div>
      </div>

      {/* 검색바 */}
      <div className="search-bar">
        <div className="search-row">
          <input
            className="search-input"
            placeholder="검색어를 입력하세요"
            value={query}
            onChange={function(e) { setQuery(e.target.value); }}
            autoCapitalize="off"
            enterKeyHint="search"
            onKeyDown={function(e) { if (e.key === 'Enter') { blurActive(); } }}
          />
          <button className="btn btn-primary btn-sm" onClick={function() { blurActive(); }}>검색</button>
          <button className="btn btn-outline btn-sm" onClick={function() { setQuery(''); blurActive(); }}>지우기</button>
        </div>
        <div className="search-tabs">
          {SEARCH_TABS.map(function(t) {
            return (
              <div
                key={t.id}
                className={'tab' + (tab === t.id ? ' active' : '')}
                onClick={function() { setTab(t.id); blurActive(); }}
              >
                {t.label}
              </div>
            );
          })}
        </div>
      </div>

      {/* 리스트 */}
      <div className="list-wrap">
        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">🔍</div>
            <div>검색 결과가 없습니다</div>
          </div>
        ) : (
          displayList.map(function(r) {
            return (
              <div key={r._id} className="card" onClick={function() { setSelected(r); }}>
                <div className="card-main">
                  <div className="avatar">{(r['이름'] || '?')[0]}</div>
                  <div className="card-info">
                    <div className="card-name">
                      {highlight(r['이름'], (tab === '이름' || tab === 'all') ? query : '')}
                    </div>
                    <div className="card-sub">{highlight(cardSub(r), query)}</div>
                  </div>
                  <div className="card-arrow">›</div>
                </div>
              </div>
            );
          })
        )}
        {filtered.length > 200 && (
          <div className="empty" style={{padding: '16px', fontSize: '13px'}}>
            검색어를 좁혀주세요 (상위 200개만 표시)
          </div>
        )}
      </div>

      {/* FAB */}
      <button className="fab" onClick={function() { setAddNew(true); }}>＋</button>

      {/* 설정 */}
      {showSettings && (
        <SettingsPanel
          onClose={function() { setShowSettings(false); }}
          fontSize={fontSize}
          setFontSize={setFontSize}
        />
      )}

      {/* 상세보기 */}
      {selected && (
        <DetailPanel
          record={selected}
          onClose={function() { setSelected(null); }}
          onEdit={handleEdit}
          onDelete={handleDelete}
        />
      )}

      {/* 수정 */}
      {editing && (
        <EditPanel
          record={editing}
          onClose={function() { setEditing(null); }}
          onSave={handleSave}
        />
      )}

      {/* 신규 등록 */}
      {addNew && (
        <EditPanel
          record={{}}
          onClose={function() { setAddNew(false); }}
          onSave={handleSave}
        />
      )}

      {/* 토스트 */}
      {toast && <div className="toast">{toast}</div>}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/klbnuri/sw.js');
  });
}
</script>
</body>
</html>
